version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: company-secretary-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    networks:
      - app-network

  # Backend API
  api:
    build: .
    container_name: company-secretary-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongo:27017/company-secretary?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads
    networks:
      - app-network

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: company-secretary-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
